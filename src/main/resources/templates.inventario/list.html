<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventario - FerreCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/list.css}">
    <script th:src="@{/js/list.js}" defer></script>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div>
            <div class="eyebrow">FerreCloud</div>
            <h1>Inventario</h1>
            <p>Gestión de productos y control de stock</p>
        </div>
        <a th:href="@{/inventario/nuevo}" class="btn-nuevo">+ Nuevo Producto</a>
    </div>

    <div class="buscador-wrapper">
        <input type="text" id="buscador" placeholder="Buscar producto por nombre, categoría, proveedor...">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Proveedor</th>
                <th>Stock Mín.</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.nombre}"></td>
                <td th:text="${producto.categoria}"></td>
                <td th:text="'$ ' + ${producto.precio}"></td>
                <td th:text="${producto.stock}"></td>
                <td th:text="${producto.proveedor}"></td>
                <td th:text="${producto.stockMinimo}"></td>
                <td class="acciones">
                    <a th:href="@{/inventario/editar/{id}(id=${producto.id})}" class="btn-editar">Editar</a>
                    <a th:href="@{/inventario/eliminar/{id}(id=${producto.id})}" class="btn-eliminar" onclick="return confirm('¿Estás seguro de eliminar este producto?');">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(productos)}" class="empty-row">
                <td colspan="7" class="empty">No hay productos registrados en el inventario aún.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
