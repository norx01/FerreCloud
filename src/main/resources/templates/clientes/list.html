<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <th:block layout:fragment="estilos">
        <link rel="stylesheet" th:href="@{/css/list.css}">
    </th:block>
</head>
<body>

<div layout:fragment="contenido">

    <div class="page-header">
        <div>
            <div class="eyebrow">FerreCloud</div>
            <h1>Clientes</h1>
            <p>Gestión de clientes registrados</p>
        </div>
        <a th:href="@{/clientes/nuevo}" class="btn-nuevo">+ Nuevo Cliente</a>
    </div>

    <div class="buscador-wrapper">
        <input type="text" id="buscador" placeholder="Buscar cliente por nombre, documento, correo...">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Documento</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td class="id-cell" th:text="${cliente.id}"></td>
                <td th:text="${cliente.nombre}"></td>
                <td th:text="${cliente.documento}"></td>
                <td th:text="${cliente.telefono}"></td>
                <td th:text="${cliente.direccion}"></td>
                <td th:text="${cliente.correoElectronico}"></td>
                <td class="acciones">
                    <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn-editar">Editar</a>
                    <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}" class="btn-eliminar">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clientes)}" class="empty-row">
                <td colspan="7" class="empty">No hay clientes registrados aún.</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/list.js}" defer></script>
</th:block>

</body>
</html>
