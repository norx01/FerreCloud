<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Órdenes - FerreCloud</title>
    <th:block layout:fragment="estilos">
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .badge-pendiente { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
            .badge-pagada    { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
            .badge-enviada   { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
        </style>
    </th:block>
</head>
<body>

<div layout:fragment="contenido">
    <div class="max-w-6xl mx-auto">

        <div class="flex items-end justify-between mb-8">
            <div>
                <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">Órdenes de Compra</h1>
                <p class="text-sm text-gray-500 mt-1">Historial y gestión de órdenes registradas</p>
            </div>
            <a th:href="@{/ordenes/nuevo}"
               class="bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
                + Nueva Orden
            </a>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">#</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Cliente</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Vendedor</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Fecha</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Productos</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Total</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Estado</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="orden, iterStat : ${ordenes}" class="hover:bg-orange-50 transition-colors">
                    <td class="px-5 py-4 text-gray-400 font-mono text-xs" th:text="${iterStat.count}"></td>
                    <td class="px-5 py-4 font-medium text-gray-800" th:text="${orden.clienteNombre}"></td>
                    <td class="px-5 py-4 text-gray-600" th:text="${orden.vendedorId}"></td>
                    <td class="px-5 py-4 text-gray-500 text-xs"
                        th:text="${#temporals.format(orden.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="px-5 py-4 text-gray-600"
                        th:text="${#lists.size(orden.productos)} + ' ítem(s)'"></td>
                    <td class="px-5 py-4 font-semibold text-gray-800"
                        th:text="'$' + ${#numbers.formatDecimal(orden.total, 1, 'COMMA', 0, 'POINT')}"></td>
                    <td class="px-5 py-4">
                            <span th:text="${orden.estado}"
                                  th:classappend="${orden.estado.name() == 'PENDIENTE'} ? 'badge-pendiente' :
                                                 (${orden.estado.name() == 'PAGADA'} ? 'badge-pagada' : 'badge-enviada')"
                                  class="text-xs font-semibold px-2.5 py-1 rounded-full">
                            </span>
                    </td>
                    <td class="px-5 py-4">
                        <a th:href="@{/ordenes/eliminar/{id}(id=${orden.id})}"
                           onclick="return confirm('¿Eliminar esta orden?')"
                           class="text-xs font-medium text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-md transition-colors">
                            Eliminar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(ordenes)}">
                    <td colspan="8" class="text-center text-gray-400 py-12 text-sm">
                        No hay órdenes registradas aún.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <p class="text-xs text-gray-400 mt-4"
           th:text="${#lists.size(ordenes)} + ' orden(es) en total'"></p>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/list.js}" defer></script>
</th:block>

</body>
</html>
