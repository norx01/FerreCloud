<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>FerreCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <th:block layout:fragment="estilos"></th:block>
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">🔧</span>
            <span class="brand-name">FerreCloud</span>
        </div>

        <nav class="sidebar-nav">
            <a th:href="@{/clientes}" class="nav-item">
                <span class="nav-icon">👥</span> Clientes
            </a>
            <a th:href="@{/usuarios}" class="nav-item">
                <span class="nav-icon">🧑‍🏭</span> Usuarios
            </a>
            <a th:href="@{/ordenes}" class="nav-item">
                <span class="nav-icon">📋</span> Órdenes
            </a>
            <a th:href="@{/productos}" class="nav-item">
                <span class="nav-icon">📦</span> Productos
            </a>
            <a th:href="@{/ventas}" class="nav-item">
                <span class="nav-icon">💰</span> Ventas
            </a>
            <a th:href="@{/proveedores}" class="nav-item">
                <span class="nav-icon">🚚</span> Proveedores
            </a>
            <a th:href="@{/inventario}" class="nav-item">
                <span class="nav-icon">🏭</span> Inventario
            </a>
            <a th:href="@{/ventas}" class="nav-item">
                <span class="nav-icon">💰</span> Ventas
            </a>
            <a th:href="@{/reportes}" class="nav-item">
                <span class="nav-icon">📊</span> Reportes
            </a>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" style="color: #9ca3af; text-decoration: none; font-size: 0.8rem;">
                🚪 Cerrar sesión
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div layout:fragment="contenido"></div>
    </main>

</div>

<script th:src="@{/js/layout.js}" defer></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
